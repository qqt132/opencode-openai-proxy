name: Update Free Models List

on:
  push:
    paths:
      - 'models.json'   # 只在 models.json 更新时触发
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update README from models.json
        run: python scripts/readme_from_models.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" && exit 0
          git add README.md README.zh-CN.md
          git commit -m "chore: update README from models.json [skip ci]"
          git push
